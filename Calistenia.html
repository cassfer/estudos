<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Módulo 1 — Calistenia</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@300;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0c10;--surface:#111318;--card:#14181f;--border:#1e2330;
  --accent:#b5f23c;--accent-dim:#8ab82c;--accent-bg:rgba(181,242,60,.08);
  --accent-done:rgba(181,242,60,.12);--border-done:#4a7a10;
  --text:#dce3f0;--muted:#6b7796;--muted2:#3a4260;
  --gold:#c9a84c;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Barlow',sans-serif;min-height:100vh;padding-bottom:60px}
body::before{content:'';position:fixed;inset:0;
  background-image:repeating-linear-gradient(-55deg,transparent,transparent 60px,rgba(181,242,60,.015) 60px,rgba(181,242,60,.015) 61px);
  pointer-events:none;z-index:0}

/* HEADER */
.ph{position:sticky;top:0;z-index:100;background:rgba(10,12,16,.94);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.ph-left{display:flex;align-items:center;gap:14px}
.back{display:inline-flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);
  text-decoration:none;padding:5px 10px;border:1px solid var(--border);border-radius:4px;
  background:var(--surface);transition:color .2s,border-color .2s}
.back:hover{color:var(--text);border-color:rgba(181,242,60,.4)}
.back svg{width:13px;height:13px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ph-title{font-family:'Bebas Neue';font-size:22px;letter-spacing:.06em;color:var(--text)}
.ph-title span{color:var(--accent)}
.ph-progress{text-align:right;min-width:110px}
.ph-count{font-family:'Bebas Neue';font-size:22px;color:var(--accent);line-height:1}
.ph-lbl{font-size:10px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;font-family:'Barlow Condensed'}
.ph-bar-outer{width:110px;height:3px;background:var(--border);border-radius:2px;margin-top:5px;overflow:hidden}
.ph-bar-inner{height:100%;background:var(--accent);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* GRID */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:14px;
  padding:24px 20px;max-width:1160px;margin:0 auto;position:relative;z-index:1}

/* CARD */
.wcard{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;
  transition:border-color .25s,transform .2s}
.wcard:hover{border-color:#2e3548;transform:translateY(-2px)}
.wcard.done{background:rgba(18,26,8,.9);border-color:var(--border-done)}
.wcard.done:hover{border-color:#639922}

/* CARD HEAD */
.card-head{padding:13px 16px 11px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border)}
.wcard.done .card-head{border-bottom-color:rgba(74,122,16,.5)}
.head-left{display:flex;flex-direction:column;gap:3px}
.treino-num{font-family:'Bebas Neue';font-size:18px;letter-spacing:.07em;color:var(--muted);transition:color .25s}
.wcard.done .treino-num{color:var(--accent)}
.sets-badge{display:inline-flex;align-items:center;gap:4px;background:#1a1e28;border:1px solid var(--border);
  border-radius:3px;padding:2px 7px;font-size:10px;color:var(--muted);letter-spacing:.06em;
  font-family:'Barlow Condensed';transition:all .25s}
.wcard.done .sets-badge{background:rgba(18,32,6,.8);border-color:rgba(74,122,16,.5);color:var(--accent-dim)}
.done-stamp{font-family:'Bebas Neue';font-size:11px;letter-spacing:.15em;color:var(--accent);
  opacity:0;transform:translateY(3px);transition:all .3s;text-align:right}
.wcard.done .done-stamp{opacity:.8;transform:translateY(0)}
.done-date{font-size:10px;color:var(--accent-dim);font-family:'Barlow Condensed';letter-spacing:.05em;
  opacity:0;transition:all .3s}
.wcard.done .done-date{opacity:.7}

/* EXERCISES */
.exercises{padding:11px 16px 14px;display:flex;flex-direction:column;gap:4px;
  border-bottom:1px solid rgba(30,35,48,.5)}
.ex-row{display:flex;align-items:baseline;gap:8px;font-size:13px}
.ex-qty{font-family:'Barlow Condensed';font-size:12px;color:var(--accent-dim);
  min-width:38px;text-align:right;flex-shrink:0;transition:color .25s}
.wcard.done .ex-qty{color:var(--accent)}
.ex-name{color:#9aa3b8;line-height:1.3;transition:color .25s}
.wcard.done .ex-name{color:#c8e89c}

/* SERIES SECTION */
.series-section{padding:12px 16px 14px}
.series-label{font-size:10px;letter-spacing:.2em;text-transform:uppercase;
  color:var(--muted);font-family:'Barlow Condensed';margin-bottom:8px}
.series-btns{display:flex;gap:8px;align-items:center}
.serie-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:9px 6px;border:1px solid var(--border);border-radius:6px;
  background:var(--surface);cursor:pointer;transition:all .22s;
  font-family:'Barlow';position:relative;overflow:hidden}
.serie-btn:hover{border-color:#2e3548}
.serie-btn.checked{background:var(--accent-done);border-color:var(--border-done)}
.serie-btn.checked .sb-num{color:var(--accent)}
.serie-btn.checked .sb-circle{background:var(--accent);border-color:var(--accent)}
.serie-btn.checked .sb-check{opacity:1;transform:scale(1)}
.sb-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;transition:all .22s;background:transparent}
.sb-check{opacity:0;transform:scale(.4);transition:all .2s}
.sb-num{font-size:10px;color:var(--muted);letter-spacing:.05em;transition:color .22s;
  font-family:'Barlow Condensed'}
/* 3rd serie glow when all done */
.serie-btn.all-done{animation:seriePulse .4s ease}
@keyframes seriePulse{0%{transform:scale(1)}50%{transform:scale(1.08)}100%{transform:scale(1)}}

/* RESET strip */
.reset-strip{text-align:center;padding:6px 16px;opacity:0;transition:opacity .3s;height:0;overflow:hidden}
.wcard.done .reset-strip{opacity:1;height:auto;padding:6px 16px 12px}
.reset-tiny{background:transparent;border:none;font-size:11px;color:rgba(107,119,150,.6);
  cursor:pointer;font-family:'Barlow';transition:color .2s;letter-spacing:.05em}
.reset-tiny:hover{color:#e55}

/* BOTTOM RESET */
.bottom-bar{text-align:center;padding:16px 20px 0;position:relative;z-index:1}
.reset-all-btn{background:transparent;border:1px solid var(--border);color:var(--muted);
  font-family:'Barlow';font-size:12px;letter-spacing:.1em;padding:9px 20px;
  border-radius:6px;cursor:pointer;text-transform:uppercase;transition:all .2s}
.reset-all-btn:hover{border-color:#e55;color:#e55}
@media(max-width:480px){.grid{padding:14px 12px;gap:10px}.ph{padding:12px 14px}}
</style>
</head>
<body>

<div class="ph">
  <div class="ph-left">
    <a href="index.html" class="back">
      <svg viewBox="0 0 24 24"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>Voltar
    </a>
    <div class="ph-title">Módulo 1 — <span>Calistenia</span></div>
  </div>
  <div class="ph-progress">
    <div class="ph-count" id="doneCount">0/15</div>
    <div class="ph-lbl">Concluídos</div>
    <div class="ph-bar-outer"><div class="ph-bar-inner" id="progressBar" style="width:0%"></div></div>
  </div>
</div>

<div class="grid" id="grid"></div>

<div class="bottom-bar">
  <button class="reset-all-btn" onclick="resetAll()">↺ Reiniciar todo o progresso</button>
</div>

<script>
const WORKOUTS=[
  {id:1,sets:3,exercises:[{qty:"30",name:"Polichinelo"},{qty:"6",name:"Barra"},{qty:"30s",name:"Prancha"},{qty:"máx",name:"Flexão de joelhos"},{qty:"15",name:"Agachamento c/ salto"},{qty:"30s",name:"Pé na bunda"},{qty:"5",name:"Barra australiana"},{qty:"máx",name:"Flexão inclinada"}]},
  {id:2,sets:3,exercises:[{qty:"30s",name:"Step-up"},{qty:"10",name:"Agachamento"},{qty:"10",name:"Afundo"},{qty:"10",name:"Agachamento c/ salto"},{qty:"10",name:"Afundo c/ elevação"},{qty:"15",name:"Sumo"},{qty:"30s",name:"Isometria"},{qty:"15",name:"Pantu unilateral"}]},
  {id:3,sets:3,exercises:[{qty:"30s",name:"Skipping"},{qty:"8",name:"Dips"},{qty:"20s",name:"Prancha lateral"},{qty:"máx",name:"Tríceps na trave"},{qty:"10",name:"Alternado"},{qty:"máx",name:"Flexão ou de joelhos"},{qty:"máx",name:"Flexão inclinada"},{qty:"20",name:"Crunches"}]},
  {id:4,sets:3,exercises:[{qty:"30s",name:"False rope"},{qty:"2",name:"Barra (A, M, F)"},{qty:"10",name:"Toe touches"},{qty:"6",name:"Barra supinada"},{qty:"40s",name:"Prancha"},{qty:"5",name:"Barra aust. (A, M, F)"},{qty:"30s",name:"Leg flutters"},{qty:"máx",name:"Bíceps na barra"}]},
  {id:5,sets:3,exercises:[{qty:"8",name:"Half burpee"},{qty:"máx",name:"Flexão pike"},{qty:"30s",name:"Bike"},{qty:"10",name:"Flexão militar"},{qty:"15",name:"Side crunches"},{qty:"10",name:"Pike caminhada"},{qty:"8",name:"Prancha alta p/ trave"},{qty:"8",name:"Caminhada chão"}]},
  {id:6,sets:3,exercises:[{qty:"40s",name:"Skipping"},{qty:"30s",name:"Agacha c/ salto"},{qty:"10",name:"Afundo saltando"},{qty:"45s",name:"Step-up"},{qty:"10",name:"Afundo explosivo"},{qty:"25",name:"Sumo"},{qty:"15",name:"Passada lateral"},{qty:"20s",name:"Iso afundo"}]},
  {id:7,sets:3,exercises:[{qty:"40s",name:"Skipping"},{qty:"30s",name:"Agacha c/ salto"},{qty:"10",name:"Afundo saltando"},{qty:"45s",name:"Step-up"},{qty:"10",name:"Afundo explosivo"},{qty:"25",name:"Sumo"},{qty:"15",name:"Passada lateral"},{qty:"20s",name:"Iso afundo"}]},
  {id:8,sets:3,exercises:[{qty:"45s",name:"Heel taps"},{qty:"10",name:"Dips"},{qty:"30s",name:"Prancha lateral"},{qty:"8",name:"Extensão de tríceps"},{qty:"15",name:"Knee raises"},{qty:"máx",name:"Flexão explosiva"},{qty:"20",name:"Tríceps na trave"},{qty:"30s",name:"In&outs A/F"},{qty:"máx",name:"Prancha alcance"}]},
  {id:9,sets:3,exercises:[{qty:"45s",name:"False rope"},{qty:"3",name:"Barra (A, M, F)"},{qty:"15",name:"Alternado"},{qty:"8",name:"Barra supinada"},{qty:"1min",name:"Prancha"},{qty:"8",name:"Barra aust. (A, M, F)"},{qty:"40s",name:"Mountain climbers"},{qty:"máx",name:"Barra aust. sup."},{qty:"45s",name:"Prancha A/F"}]},
  {id:10,sets:3,exercises:[{qty:"10",name:"Half burpee"},{qty:"máx",name:"Caminhada"},{qty:"20",name:"Leg raises"},{qty:"10",name:"Pike shoulder tap"},{qty:"8",name:"Flexão pike c/ elev."},{qty:"45s",name:"Crunches"},{qty:"máx",name:"Flexão declinada"},{qty:"máx",name:"Prancha na parede"},{qty:"máx",name:"Dips"}]},
  {id:11,sets:3,exercises:[{qty:"50",name:"Polichinelo"},{qty:"10",name:"Barra"},{qty:"45s",name:"Prancha alternate"},{qty:"máx",name:"Diamante"},{qty:"10",name:"Canivete"},{qty:"5",name:"Barra sup. (A, M, F)"},{qty:"3",name:"Caminhada"},{qty:"10",name:"Dips"},{qty:"50",name:"Crunches"},{qty:"máx",name:"Barra aust. arqueiro"}]},
  {id:12,sets:3,exercises:[{qty:"10",name:"Half burpee"},{qty:"30s",name:"Afundo saltando"},{qty:"15",name:"Afundo c/ elev."},{qty:"8",name:"Pistol c/ suporte"},{qty:"10",name:"Salto frontal"},{qty:"8",name:"Agacha + afundo"},{qty:"15",name:"Ponte"},{qty:"20",name:"Panturrilha"},{qty:"máx",name:"Iso ponta do pé"}]},
  {id:13,sets:3,exercises:[{qty:"8",name:"Burpee"},{qty:"12",name:"Dips"},{qty:"10",name:"Prancha J/C"},{qty:"10",name:"P.A p/ B + F.M"},{qty:"máx",name:"Tuck L-sit"},{qty:"máx",name:"Diamante p/ regular"},{qty:"40s",name:"Mountain climbers"},{qty:"máx",name:"Flexão inclinada exp."},{qty:"40s",name:"Bike"},{qty:"máx",name:"Flexão hold"}]},
  {id:14,sets:3,exercises:[{qty:"10",name:"Escápula"},{qty:"10",name:"Barra"},{qty:"10",name:"Corner raises"},{qty:"10",name:"Barra tradicional"},{qty:"15",name:"Knee raises"},{qty:"10",name:"Barra aust. sup. (A, M, F)"},{qty:"15",name:"Leg raises"},{qty:"máx",name:"Barra aust. sup. arq."},{qty:"40s",name:"Leg X"},{qty:"20",name:"Bíceps na barra"}]},
  {id:15,sets:3,exercises:[{qty:"12",name:"Half burpee"},{qty:"10",name:"Pike c/ elev."},{qty:"8",name:"Ombro p/ ombro"},{qty:"15",name:"Sit-ups"},{qty:"máx",name:"Pike hold"},{qty:"20",name:"Pike caminhada"},{qty:"20",name:"Remador"},{qty:"máx",name:"HS hold"},{qty:"15",name:"Flexão militar"},{qty:"máx",name:"Caminhada"}]},
];

const STORAGE_KEY='calistenia_m1';

// State: { "1": { series:[false,false,false], done:false, doneDate:null }, ... }
let state={};

function loadState(){
  try{
    const raw=localStorage.getItem(STORAGE_KEY);
    if(raw) state=JSON.parse(raw);
  }catch(e){state={};}
  // Fill missing
  WORKOUTS.forEach(w=>{
    if(!state[w.id]) state[w.id]={series:[false,false,false],done:false,doneDate:null};
    if(!state[w.id].series) state[w.id].series=[false,false,false];
  });
}

function saveState(){
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch(e){}
}

function fmtDate(iso){
  if(!iso)return'';
  const d=new Date(iso);
  return d.toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric'});
}

function toggleSerie(wid, idx, e){
  e.stopPropagation();
  const ws=state[wid];
  ws.series[idx]=!ws.series[idx];
  // Check if all 3 done
  const allDone=ws.series.every(Boolean);
  if(allDone&&!ws.done){
    ws.done=true;
    ws.doneDate=new Date().toISOString();
  } else if(!allDone&&ws.done){
    ws.done=false;
    ws.doneDate=null;
  }
  saveState();
  updateCard(wid);
  updateProgress();
}

function resetWorkout(wid, e){
  e.stopPropagation();
  state[wid]={series:[false,false,false],done:false,doneDate:null};
  saveState();
  updateCard(wid);
  updateProgress();
}

function updateCard(wid){
  const ws=state[wid];
  const card=document.querySelector(`[data-wid="${wid}"]`);
  if(!card)return;
  card.classList.toggle('done',ws.done);
  // Update series buttons
  ws.series.forEach((checked,i)=>{
    const btn=card.querySelector(`.serie-btn[data-idx="${i}"]`);
    if(btn) btn.classList.toggle('checked',checked);
  });
  // Done stamp & date
  const stamp=card.querySelector('.done-stamp');
  const dateEl=card.querySelector('.done-date');
  if(stamp) stamp.textContent=ws.done?'✓ CONCLUÍDO':'';
  if(dateEl) dateEl.textContent=ws.done?fmtDate(ws.doneDate):'';
}

function updateProgress(){
  const done=Object.values(state).filter(v=>v.done).length;
  const total=WORKOUTS.length;
  document.getElementById('doneCount').textContent=`${done}/${total}`;
  document.getElementById('progressBar').style.width=`${(done/total)*100}%`;
}

function resetAll(){
  if(!confirm('Zerar todo o progresso do Módulo 1?'))return;
  WORKOUTS.forEach(w=>{ state[w.id]={series:[false,false,false],done:false,doneDate:null}; });
  saveState();
  WORKOUTS.forEach(w=>updateCard(w.id));
  updateProgress();
}

function render(){
  const grid=document.getElementById('grid');
  grid.innerHTML='';
  WORKOUTS.forEach(w=>{
    const ws=state[w.id]||{series:[false,false,false],done:false,doneDate:null};
    const card=document.createElement('div');
    card.className='wcard'+(ws.done?' done':'');
    card.dataset.wid=w.id;

    const exRows=w.exercises.map(ex=>`
      <div class="ex-row">
        <span class="ex-qty">${ex.qty}</span>
        <span class="ex-name">${ex.name}</span>
      </div>`).join('');

    const serieBtns=[0,1,2].map(i=>`
      <button class="serie-btn${ws.series[i]?' checked':''}" data-idx="${i}" onclick="toggleSerie(${w.id},${i},event)" title="Marcar série ${i+1}">
        <div class="sb-circle">
          <svg class="sb-check" width="12" height="9" viewBox="0 0 12 9" fill="none">
            <path d="M1 4.5L4.5 8L11 1" stroke="#0a0c10" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="sb-num">SÉRIE ${i+1}</span>
      </button>`).join('');

    card.innerHTML=`
      <div class="card-head">
        <div class="head-left">
          <div class="treino-num">TREINO ${String(w.id).padStart(2,'0')}</div>
          <span class="sets-badge">× ${w.sets} séries</span>
        </div>
        <div style="text-align:right">
          <div class="done-stamp">${ws.done?'✓ CONCLUÍDO':''}</div>
          <div class="done-date">${ws.done?fmtDate(ws.doneDate):''}</div>
        </div>
      </div>
      <div class="exercises">${exRows}</div>
      <div class="series-section">
        <div class="series-label">Marque cada série concluída</div>
        <div class="series-btns">${serieBtns}</div>
      </div>
      <div class="reset-strip">
        <button class="reset-tiny" onclick="resetWorkout(${w.id},event)">↺ desfazer treino</button>
      </div>`;

    grid.appendChild(card);
  });
  updateProgress();
}

loadState();
render();
</script>
</body>
</html>
