<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PRF — Central de Planos</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@400;500;600&family=Barlow+Condensed:wght@300;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0c10;
      --surface: #111318;
      --border: #1e2330;
      --gold: #c9a84c;
      --gold-light: #e8c96a;
      --blue: #1a3a6b;
      --blue-bright: #2b5faa;
      --text: #dce3f0;
      --muted: #6b7796;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Barlow', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow-x: hidden;
    }

    /* Grain texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4;
    }

    /* Diagonal accent lines background */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: repeating-linear-gradient(
        -55deg,
        transparent,
        transparent 60px,
        rgba(201,168,76,0.03) 60px,
        rgba(201,168,76,0.03) 61px
      );
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 680px;
      padding: 48px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    /* Badge / emblem */
    .badge {
      width: 72px;
      height: 72px;
      border: 2px solid var(--gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin-bottom: 32px;
      animation: pulse-ring 3s ease-in-out infinite;
    }

    .badge::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      border: 1px solid rgba(201,168,76,0.2);
      animation: pulse-ring 3s ease-in-out infinite 0.5s;
    }

    .badge svg {
      width: 36px;
      height: 36px;
      fill: var(--gold);
    }

    @keyframes pulse-ring {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Header */
    .label {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 300;
      font-size: 11px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 10px;
      opacity: 0;
      animation: fade-up 0.6s forwards 0.1s;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(56px, 12vw, 88px);
      letter-spacing: 0.04em;
      line-height: 0.92;
      text-align: center;
      color: var(--text);
      margin-bottom: 6px;
      opacity: 0;
      animation: fade-up 0.6s forwards 0.2s;
    }

    h1 span {
      color: var(--gold);
    }

    .subtitle {
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 300;
      font-size: 14px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 52px;
      opacity: 0;
      animation: fade-up 0.6s forwards 0.3s;
    }

    /* Divider */
    .divider {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 40px;
      opacity: 0;
      animation: fade-up 0.6s forwards 0.4s;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--border));
    }
    .divider::after {
      background: linear-gradient(to left, transparent, var(--border));
    }

    .divider span {
      font-size: 10px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      white-space: nowrap;
    }

    /* Cards */
    .cards {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 32px 28px;
      text-decoration: none;
      color: inherit;
      overflow: hidden;
      transition: border-color 0.3s, transform 0.3s;
      opacity: 0;
    }

    .card:nth-child(1) { animation: fade-up 0.5s forwards 0.5s; }
    .card:nth-child(2) { animation: fade-up 0.5s forwards 0.65s; }

    .card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 2px;
      background: linear-gradient(to right, transparent, var(--gold), transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top left, rgba(201,168,76,0.06) 0%, transparent 70%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .card:hover {
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-3px);
    }

    .card:hover::before,
    .card:hover::after { opacity: 1; }

    .card-icon {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 3px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      transition: border-color 0.3s;
    }

    .card:hover .card-icon {
      border-color: rgba(201,168,76,0.5);
    }

    .card-icon svg {
      width: 20px;
      height: 20px;
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .card-tag {
      font-size: 9px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      font-family: 'Barlow Condensed', sans-serif;
      margin-bottom: 8px;
    }

    .card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 0.05em;
      color: var(--text);
      line-height: 1.1;
      margin-bottom: 10px;
    }

    .card-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      font-weight: 400;
    }

    .card-arrow {
      position: absolute;
      bottom: 24px;
      right: 24px;
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.3s, background 0.3s;
    }

    .card-arrow svg {
      width: 12px;
      height: 12px;
      stroke: var(--muted);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.3s;
    }

    .card:hover .card-arrow {
      border-color: var(--gold);
      background: rgba(201,168,76,0.1);
    }

    .card:hover .card-arrow svg { stroke: var(--gold); }

    /* Footer */
    .footer {
      margin-top: 48px;
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      opacity: 0;
      animation: fade-up 0.5s forwards 0.8s;
    }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 480px) {
      .cards { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrapper">

    <div class="badge">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z"/>
      </svg>
    </div>

    <p class="label">Preparação PRF 2026</p>
    <h1>Central de<br /><span>Planos</span></h1>
    <p class="subtitle">Polícia Rodoviária Federal</p>

    <div class="divider"><span>selecione um plano</span></div>

    <div class="cards">

      <!-- Card 1: Plano de Estudos -->
      <a href="plano_estudos_prf.html" class="card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
        </div>
        <p class="card-tag">Teórico</p>
        <h2 class="card-title">Plano de Estudos</h2>
        <p class="card-desc">Cronograma de matérias, revisões e simulados para o concurso.</p>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>

      <!-- Card 2: Plano TAF -->
      <a href="plano_taf_prf.html" class="card">
        <div class="card-icon">
          <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="3"/><path d="M6.5 8a5.5 5.5 0 0 0 0 4"/><path d="M17.5 8a5.5 5.5 0 0 1 0 4"/><path d="M12 8v4l2.5 2.5"/><path d="M8 21l2-6h4l2 6"/></svg>
        </div>
        <p class="card-tag">Físico</p>
        <h2 class="card-title">Plano TAF</h2>
        <p class="card-desc">Treinos e metas para o Teste de Aptidão Física da PRF.</p>
        <div class="card-arrow">
          <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>

    </div>

    <p class="footer">Foco &nbsp;·&nbsp; Disciplina &nbsp;·&nbsp; Aprovação</p>

  </div>
</body>
</html>
